# Basic settings
description:  A Personal Blog.
baseurl: "/"
url: "https://xiezg247.github.io" 
twitter_username: xiezg247
github_username:  xiezg247
include: ['_pages']

# Build settings
highlighter:    true
markdown:    kramdown
highlighter: pygments
lsi:         false
excerpt_separator: "\n\n"
gems:
  - jekyll-feed
  - jekyll-paginate
exclude:
  - Gemfile
  - Gemfile.lock

# pagination
gems: [jekyll-paginate]
paginate: 5
paginate_path: "/page:num/"

# Enable comments
comments: true

# Markdown settings
kramdown:
  math_engine:    mathjax
  auto_ids:       true
  footnote_nr:    1
  entity_output:  as_char
  toc_levels:     1..6
  smart_quotes:   lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

  syntax_highlighter_opts:
    wrap:              div
    tab_width:         4
    bold_every:        10
    css:               style
plugins_dir: [jekyll-mermaid]
mermaid:
   src: "https://xiezg247.github.io/js/mermaid.min.js"